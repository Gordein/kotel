{% extends "base.html" %}
{% block content %}
<h1>Закрыть долг</h1>
{% if not creditors %}
<p class="muted">Ты никому не должен.</p>
<a class="btn btn-ghost" href="{{ url_for('balance.index') }}" style="margin-top:12px">Назад</a>
{% else %}
<form method="post" action="{{ url_for('settlement.create') }}" data-idempotent="1"
      x-data="{ to: {{ creditors[0].id }},
                amounts: { {% for c in creditors %}{{ c.id }}: '{{ c.amount }}'{{ ',' if not loop.last }}{% endfor %} },
                amount: '{{ creditors[0].amount }}', method: 'cash' }">
  <label>Кому</label>
  <div class="chips">
    {% for c in creditors %}
    <button type="button" class="chip" :aria-pressed="to==={{ c.id }}"
            @click="to={{ c.id }}; amount=amounts[{{ c.id }}]">{{ c.name }} · {{ c.amount }} zł</button>
    {% endfor %}
    <input type="hidden" name="to_person" :value="to">
  </div>
  <label>Сумма, zł<input name="amount" x-model="amount" inputmode="decimal" required></label>
  <label>Как</label>
  <div class="chips">
    <button type="button" class="chip" :aria-pressed="method==='cash'" @click="method='cash'">Наличкой</button>
    <button type="button" class="chip" :aria-pressed="method==='transfer'" @click="method='transfer'">Переводом</button>
    <input type="hidden" name="method" :value="method">
  </div>
  <input type="hidden" name="settled_on" value="{{ today }}">
  <div id="form-error"></div>
  <button class="btn" style="margin-top:16px">Готово</button>
</form>
{% endif %}
{% endblock %}
