{% extends "base.html" %}
{% block content %}
<h1>Профиль — {{ current_user.name }}</h1>

<form method="post" action="{{ url_for('profile.update_pin') }}" class="card">
  <label>Сменить PIN<input name="pin" type="password" inputmode="numeric" maxlength="8" required></label>
  {% if msg %}<p class="muted" style="margin-top:8px">{{ msg }}</p>{% endif %}
  <button class="btn" style="margin-top:12px">Сохранить</button>
</form>

<form method="post" action="{{ url_for('auth.do_logout') }}">
  <button class="btn btn-ghost">Выйти</button>
</form>
{% endblock %}
