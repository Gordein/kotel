{% extends "base.html" %}
{% block content %}
<h1>Котёл</h1>
<form method="post" action="{{ url_for('auth.do_login') }}">
  <label>PIN<input name="pin" type="password" inputmode="numeric" autocomplete="off"
                   maxlength="8" autofocus required></label>
  {% if error %}<p class="warn">{{ error }}</p>{% endif %}
  <button class="btn" style="margin-top:16px">Войти</button>
</form>
{% endblock %}
